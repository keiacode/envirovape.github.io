html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envirovape - Coming Soon</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #000000; /* Match your image background color */
            overflow: hidden;
        }

        /* Base rules for both images */
        .landing-img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        /* 🖥️ Desktop Rule: Hide the mobile image on larger screens */
        .mobile-only {
            display: none;
        }

        /* 📱 Mobile Rule: If the screen is narrower than 768px, swap them */
        @media (max-width: 768px) {
            .desktop-only {
                display: none;
            }
            .mobile-only {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- Desktop Version -->
    <img src="envirovape_landing_page_final2.png" class="landing-img desktop-only" alt="Coming Soon">

    <!-- Mobile Version -->
    <img src="envirovape_landing_page_final3_mobile.png" class="landing-img mobile-only" alt="Coming Soon">

</body>
</html>
